<!DOCTYPE html>
<html>
<head>
<title>Simple Calculator</title>

<style>
body{
    background:#f2f2f2;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.display{
    width:100%;
    height:40px;
    margin-bottom:10px;
    border:1px solid #ccc;
    text-align:right;
    font-size:20px;
    padding:5px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,60px);
    gap:10px;
}

button{
    height:50px;
    font-size:18px;
    border:none;
    background:#e0e0e0;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#cfcfcf;
}
</style>

</head>

<body>

<div class="calculator">

<input type="text" class="display" placeholder="0">

<div class="buttons">
<button>7</button>
<button>8</button>
<button>9</button>
<button>/</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button>*</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button>-</button>

<button>0</button>
<button>C</button>
<button>=</button>
<button>+</button>
</div>

</div>

</body>
</html>
